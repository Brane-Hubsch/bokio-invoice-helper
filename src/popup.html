<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Invoice Helper for Bokio</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup" aria-label="Invoice Helper for Bokio">
      <h1 class="popup-title">Invoice Helper for Bokio</h1>

      <p id="status-copy" class="status-copy">
        Invoice Helper only runs on Bokio.se
      </p>

      <label class="toggle-row">
        <span>Autoselect E-mail delivery</span>
        <input class="toggle-input" type="checkbox" aria-label="Autoselect E-mail delivery">
        <span class="toggle-control" aria-hidden="true"></span>
      </label>

      <footer class="footer">
        <p>
          Created by
          <a href="https://bh.studio" target="_blank" rel="noopener noreferrer">Bräne Hübsch</a>
        </p>
        <p>No affiliation with Bokio AB</p>
      </footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
