<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8">
    <title>Bokio invoice fixture</title>
  </head>
  <body>
    <main>
      <section data-testid="delivery-method-section">
        <h1 data-fixture-heading>Delivery method options</h1>
        <label>
          <input
            data-testid="EmailMethod_DeliveryItem"
            type="radio"
            name="deliveryMethod"
          >
          <span data-fixture-text>E-mail to customer</span>
        </label>
        <label>
          <input
            data-testid="EInvoiceDeliveryItem"
            type="radio"
            name="deliveryMethod"
            checked
          >
          <span data-fixture-text>E-invoice</span>
        </label>
      </section>

      <section data-testid="email-section">
        <h1 data-fixture-heading>Invoice delivery options</h1>
        <label data-value="Link" data-name="emailDeliveryType">
          <input
            data-testid="EmailMethod_DeliveryType_Radio"
            type="radio"
            value="Link"
            checked
            name="emailDeliveryType"
          >
          <span data-fixture-text>Language-independent placeholder A</span>
        </label>
        <label data-value="LinkAndPdf" data-name="emailDeliveryType">
          <input
            data-testid="EmailMethod_DeliveryType_Radio"
            type="radio"
            value="LinkAndPdf"
            name="emailDeliveryType"
          >
          <span data-fixture-text>Language-independent placeholder B</span>
        </label>
      </section>
    </main>
  </body>
</html>
